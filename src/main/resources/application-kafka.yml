# ============================================================
# Kafka 配置（v1.1.0）
# ============================================================
# ★ 核心 Kafka 配置（生产者/消费者/容器工厂）在 KafkaConfig.java 中
#    该 Java Config 覆盖了 Spring Boot 自动配置，权威来源以代码为准
# ★ 集群连接地址在 KafkaConfig.java 中硬编码：
#    localhost:9092,localhost:9094,localhost:9096
# ★ 集群搭建参见：docs/kafka-setup-windows.md
# ============================================================

# ———————— 自定义属性 ————————
kafka:
  demo:
    # 消费者模拟失败的概率（0.0 ~ 1.0）
    # 0.0：正常处理（默认）
    # 1.0：每条消息都会失败，方便观察重试和 DLT 流程
    fail-chance: 0.0
