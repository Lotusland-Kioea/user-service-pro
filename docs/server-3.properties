# ============================================================
# Kafka 4.0.2 — 节点 3 配置（单机三节点 KRaft 集群）
# 使用方法：复制到 D:\Develop\kafka_2.13-4.0.2\config\kraft\
# ============================================================

# ======== KRaft 模式 ========
process.roles=broker,controller
node.id=3
controller.quorum.voters=1@localhost:9093,2@localhost:9095,3@localhost:9097

# ======== 网络监听 ========
listeners=PLAINTEXT://localhost:9096,CONTROLLER://localhost:9097
advertised.listeners=PLAINTEXT://localhost:9096
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL
controller.listener.names=CONTROLLER
inter.broker.listener.name=PLAINTEXT

# ======== 存储路径（必须使用正斜杠 /） ========
log.dirs=D:/Develop/kafka/kafka_2.13-4.0.2/data/kraft-3
metadata.log.dir=D:/Develop/kafka/kafka_2.13-4.0.2/data/kraft-3

# ======== 线程配置 ========
num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# ======== 集群级 Topic 默认配置 ========
num.partitions=3
default.replication.factor=3
min.insync.replicas=2
offsets.topic.replication.factor=3
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2
